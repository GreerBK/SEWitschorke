# ─────────────────────────────────────────────────────
# Decap CMS Configuration for SE Witschorke's Website
# ─────────────────────────────────────────────────────
# SETUP: Replace YOUR_GITHUB_USERNAME/YOUR_REPO_NAME below
# with your actual GitHub repository path, e.g. bradwitschorke/se-witschorke-site

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main
  base_url: https://YOUR_SITE.pages.dev
  auth_endpoint: /api/auth

# Where uploaded images go
media_folder: "public/images"
public_folder: "/images"

# ─── Content Collections ───

collections:
  # ── Site Settings (hero, social links, feeds) ──
  - name: "settings"
    label: "⚙️ Site Settings"
    editor:
      preview: false
    files:
      - name: "site"
        label: "Site Info & Hero"
        file: "content/site.json"
        fields:
          - { name: "title", label: "Site Title", widget: "string", default: "SE Witschorke" }
          - { name: "subtitle", label: "Subtitle", widget: "string", default: "Author – Foodie – Traveler" }
          - { name: "heroQuote", label: "Hero Quote", widget: "text" }
          - { name: "heroQuoteAttribution", label: "Quote Attribution (optional)", widget: "string", required: false }
          - { name: "heroImage", label: "Hero Background Image", widget: "image" }
          - { name: "authorImage", label: "Author Portrait", widget: "image" }
          - { name: "substackUrl", label: "Substack URL", widget: "string" }
          - { name: "substackText", label: "Substack Link Text", widget: "string" }
          - { name: "substackDescription", label: "Substack Description", widget: "text" }
          - { name: "socialUrl", label: "Social Media URL", widget: "string" }
          - { name: "socialText", label: "Social Link Text", widget: "string" }
          - { name: "socialDescription", label: "Social Description", widget: "text" }
          - { name: "instagramUrl", label: "Instagram URL", widget: "string" }
          - { name: "twitterUrl", label: "Twitter/X URL", widget: "string" }

  # ── About Page ──
  - name: "about"
    label: "📝 About Page"
    editor:
      preview: false
    files:
      - name: "about"
        label: "Bio, Awards & Photos"
        file: "content/about.json"
        fields:
          - name: "bio"
            label: "Bio Paragraphs"
            widget: "list"
            field: { name: "paragraph", label: "Paragraph", widget: "text" }
          - name: "awards"
            label: "Awards"
            widget: "list"
            fields:
              - { name: "year", label: "Year", widget: "string" }
              - { name: "title", label: "Award Title", widget: "string" }
              - { name: "work", label: "Book Title", widget: "string" }
          - name: "foodPhotos"
            label: "Food & Travel Photos"
            widget: "list"
            fields:
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "alt", label: "Description (for accessibility)", widget: "string" }

  # ── Books ──
  - name: "books"
    label: "📚 Books"
    editor:
      preview: false
    files:
      - name: "books"
        label: "Book List"
        file: "content/books.json"
        fields:
          - name: "books"
            label: "Books"
            widget: "list"
            fields:
              - { name: "title", label: "Book Title", widget: "string" }
              - { name: "image", label: "Cover Image", widget: "image" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "year", label: "Year", widget: "string" }
              - name: "category"
                label: "Category"
                widget: "select"
                options: ["Middle Grade", "Young Adult", "Adult Fiction", "Non-Fiction", "Poetry"]

  # ── Gallery ──
  - name: "gallery"
    label: "🖼️ Gallery"
    editor:
      preview: false
    files:
      - name: "gallery"
        label: "Gallery Photos"
        file: "content/gallery.json"
        fields:
          - name: "items"
            label: "Gallery Items"
            widget: "list"
            fields:
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "alt", label: "Photo Description", widget: "string" }
              - name: "state"
                label: "State"
                widget: "select"
                options: ["Texas", "Nebraska", "Maine", "Vermont", "New York", "Minnesota"]
              - { name: "blurb", label: "Caption / Story", widget: "text" }
